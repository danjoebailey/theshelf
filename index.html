<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Book Tracker</title>
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      button, a, [role="button"], [style*="cursor:pointer"], [style*="cursor: pointer"] { touch-action: manipulation; }
      @media (hover: none) { *, *::before, *::after { transition-duration: 0s !important; } }
      html, body { background: #3a2010; overflow: hidden; position: fixed; width: 100%; height: 100%; margin: 0; }
      #root { width: 100%; height: 100%; overflow: hidden; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Required link to privacy policy on home page for Google OAuth verification. -->
    <!-- Sits in the DOM (crawlable + screen-reader accessible) below the React app's -->
    <!-- 100%-height viewport, so it does not appear in normal use. -->
    <footer>
      <a href="/privacy.html">Privacy Policy</a> ·
      <a href="/terms.html">Terms of Service</a> ·
      <a href="mailto:flosartiscreative@gmail.com">Contact</a>
    </footer>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
